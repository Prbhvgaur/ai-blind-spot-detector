name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: blindspot_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:password@localhost:5432/blindspot_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-test-jwt-secret-test-jwt-secret-1234
          JWT_REFRESH_SECRET: test-refresh-secret-test-refresh-secret-1234567
          ANTHROPIC_API_KEY: test
          STRIPE_SECRET_KEY: sk_test_mock
          STRIPE_WEBHOOK_SECRET: whsec_mock
          STRIPE_PRO_PRICE_ID: price_mock
          NEXT_PUBLIC_API_URL: http://localhost:3101
          NEXTAUTH_SECRET: test-nextauth-secret-test-nextauth-secret-12345
          NEXTAUTH_URL: http://localhost:3000
